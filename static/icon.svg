<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#f5f1e9"/>
  <!-- Decorative ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#a06c1e" stroke-width="2.5" opacity="0.2"/>

  <!-- Left minaret body -->
  <rect x="100" y="195" width="36" height="195" fill="#a06c1e"/>
  <!-- Left minaret spire -->
  <polygon points="118,150 100,195 136,195" fill="#a06c1e"/>
  <!-- Left minaret balcony -->
  <rect x="91" y="286" width="54" height="9" fill="#a06c1e"/>
  <!-- Left finial circle -->
  <circle cx="118" cy="146" r="7" fill="#a06c1e"/>

  <!-- Right minaret body -->
  <rect x="376" y="195" width="36" height="195" fill="#a06c1e"/>
  <!-- Right minaret spire -->
  <polygon points="394,150 376,195 412,195" fill="#a06c1e"/>
  <!-- Right minaret balcony -->
  <rect x="367" y="286" width="54" height="9" fill="#a06c1e"/>
  <!-- Right finial circle -->
  <circle cx="394" cy="146" r="7" fill="#a06c1e"/>

  <!-- Main mosque body -->
  <rect x="136" y="300" width="240" height="90" fill="#a06c1e"/>

  <!-- Central dome -->
  <path d="M 136,300 A 120,120 0 0,1 376,300 Z" fill="#a06c1e"/>

  <!-- Doorway arch (cream cutout) -->
  <path d="M 224,390 L 224,346 A 32,32 0 0,1 288,346 L 288,390 Z" fill="#f5f1e9"/>

  <!-- Crescent finial on dome (cream) -->
  <path d="M 256,163 a 17,17 0 1,1 0,34 a 13,13 0 1,0 0,-34 z" fill="#f5f1e9"/>
</svg>
